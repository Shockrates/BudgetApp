<div class="flex flex-col gap-4 border-2 border-solid border-black py-4 px-5 rounded-[25px]
      hover:bg-sky-500 hover:text-white cursor-pointer duration-300 ease-in-out" [class]="{
          'bg-white': household.isSelected == false,
          'bg-sky-500': household.isSelected== true
        }" (click)="handleOnSelect()">
  <p class="text-xl text-left">{{household.name}}</p>
</div>
