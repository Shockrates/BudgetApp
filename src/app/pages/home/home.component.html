        </app-form-wrapper>

        <!-- Expence Form -->
        <app-form-wrapper class="w-full md:w-1/2" [formGroup]="expenseForm">
            <div class="input-form flex flex-col gap-y-4">
                <h3 class="font-bold text-2xl">Add New Expense</h3>

                <div class="text-input-container flex gap-x-6">
                    <div class="text-inputs flex flex-col gap-y-2">
                        <label class="text-[19px] font-bold">Expense Name</label>
                        <input formControlName="name" type="text" class="input-select" placeholder="Expense Name">
                    </div>

                    <div class="text-inputs flex flex-col gap-y-2">
                        <label class="text-[19px] font-bold">Amount</label>
                        <input formControlName="amount" type="number" class="input-select" placeholder="e.g 120€">
                    </div>
                </div>

                <div class="text-inputs flex flex-col gap-y-2">
                    <label class="text-[19px] font-bold">Expense Category</label>

                    <select name="" id="" class="input-select" formControlName="budgetCategoryId">

                        @for (item of budgetCategories; track $index) {
                        <option value="{{item.id}}">{{item.name}}</option>
                        }

                    </select>
                </div>


                <button [disabled]="expenseForm.invalid" (click)="addExpense()"
                    class="btn bg-customHsl-text text-white border-none w-fit text-[19px]">
                    Add Expense
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"
                        width="20">
                        <path fill-rule="evenodd"
                            d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 9a.75.75 0 00-1.5 0v2.25H9a.75.75 0 000 1.5h2.25V15a.75.75 0 001.5 0v-2.25H15a.75.75 0 000-1.5h-2.25V9z"
                            clip-rule="evenodd"></path>
                    </svg>
                </button>

            </div>
        </app-form-wrapper>
    </div>


    @if (budgetCards && budgetCards.length > 0) {
    <h2 class="mini-title">Existing Budgets</h2>
    <div class="flex w-full flex-wrap gap-4">
        @for (budgetCard of budgetCards; track $index){
        <app-budget-card [config]="budgetCard" class="budget-card"></app-budget-card>
        }
    </div>
    }

    @if (expenseTableData && expenseTableData.length > 0 ){
    <h2 class="mini-title">Recent Expenses</h2>
    <app-expense-table (removeRow)="handleDelete($event)" [expenseConfig]="expenseTableData"></app-expense-table>


    }

</div>
